<!DOCTYPE html>
<html>
<head>
    <title>API Test</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #1a1a1a; color: #fff; }
        button { padding: 10px 20px; margin: 10px; cursor: pointer; }
        #result { background: #2a2a2a; padding: 15px; margin-top: 20px; border-radius: 5px; }
        .success { color: #4ade80; }
        .error { color: #ef4444; }
    </style>
</head>
<body>
    <h1>CRM API Connection Test</h1>
    
    <button onclick="testAPI()">Test Backend Connection</button>
    <button onclick="testRegister()">Test Registration</button>
    
    <div id="result"></div>
    
    <script>
        async function testAPI() {
            const result = document.getElementById('result');
            result.innerHTML = 'Testing...';
            
            try {
                const response = await fetch('http://localhost:8000/api/v1/auth/register-admin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        fullname: 'Test User',
                        email: `test${Date.now()}@example.com`,
                        password: 'password123'
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    result.innerHTML = `<div class="success">✅ SUCCESS!<br>Status: ${response.status}<br>Message: ${data.message}</div>`;
                } else {
                    result.innerHTML = `<div class="error">❌ ERROR<br>Status: ${response.status}<br>Message: ${data.message || JSON.stringify(data)}</div>`;
                }
            } catch (error) {
                result.innerHTML = `<div class="error">❌ CONNECTION ERROR<br>${error.message}</div>`;
            }
        }
        
        async function testRegister() {
            alert('Use the Test Backend Connection button first!');
        }
    </script>
</body>
</html>
